name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_NAME: test
  DB_USER: test_user
  DB_PASSWORD: dummy
  DB_DSN: test_user:dummy@tcp(127.0.0.1:3306)/test

jobs:
  run_code_checks:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: dummy
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repo Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.24

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..20}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot && break
            sleep 2
          done

      - name: Run Go tests
        env:
          DB_DSN: ${{ env.DB_DSN }}
        run: go test ./...

      - name: Run Go linting
        run: |
          go fmt ./...
          go vet ./...
