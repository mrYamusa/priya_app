name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DB_NAME: test
  DB_PASSWORD: dummy
  DB_USER: test_user

jobs:
  run_code_checks:
    runs-on: ubuntu-latest

    steps:
      - name: Set up MySQL
        run: |
          sudo /etc/init.d/mysql start

          # Create database
          sudo mysql -e "CREATE DATABASE ${{ env.DB_NAME }};"

          # Create user and grant privileges
          sudo mysql -e "CREATE USER '${{ env.DB_USER }}'@'%' IDENTIFIED BY '${{ env.DB_PASSWORD }}';"
          sudo mysql -e "GRANT ALL PRIVILEGES ON ${{ env.DB_NAME }}.* TO '${{ env.DB_USER }}'@'%';"
          sudo mysql -e "FLUSH PRIVILEGES;"

      - name: Checkout Repo Code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20

      - name: Run Go tests
        run: go test ./...

      - name: Run Go linting
        run: |
          go fmt ./...
          go vet ./...
